name: CI/CD Pipeline

# Triggers: every push to main and every PR targeting main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Run Tests ───────────────────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install application dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-cov

      - name: Run unit & smoke tests
        run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing

  # ── Job 2: Build Docker Image (every push, after tests pass) ──────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local, no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: finance-rag-llm:${{ github.sha }}
          # Cache layers between runs to speed up builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Push to Docker Hub (main branch only) ───────────────────────────
  # Requires two repository secrets to be configured in GitHub:
  #   Settings → Secrets → Actions → New repository secret
  #     DOCKERHUB_USERNAME  — your Docker Hub username
  #     DOCKERHUB_TOKEN     — Docker Hub access token (Account Settings → Security)
  #
  # Free Docker Hub account: https://hub.docker.com  (no credit card required)
  docker-push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/finance-rag-llm:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/finance-rag-llm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 4: Deploy to AWS EC2 (main branch only) ────────────────────────────
  # Requires three repository secrets:
  #   EC2_HOST   — public IPv4 of your EC2 instance
  #   EC2_USER   — ec2-user (Amazon Linux) or ubuntu (Ubuntu AMI)
  #   EC2_SSH_KEY — full contents of your .pem key file
  #
  # One-time EC2 setup: see docker-compose.prod.yml header comments.
  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/finance-rag-llm

            # Pull latest image from Docker Hub
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
              docker compose -f docker-compose.prod.yml pull

            # Restart container with new image
            DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }} \
              docker compose -f docker-compose.prod.yml up -d

            # Clean up dangling images to save disk space
            docker system prune -f
