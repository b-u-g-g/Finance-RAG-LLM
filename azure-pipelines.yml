trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  PYTHON_VERSION: '3.11'
  IMAGE_NAME: 'finance-rag-llm'

stages:

# ── Stage 1: Test ─────────────────────────────────────────────────────────────
- stage: Test
  displayName: 'Lint & Test'
  jobs:
  - job: RunTests
    displayName: 'Run Unit & Smoke Tests'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(PYTHON_VERSION)'
      displayName: 'Set up Python $(PYTHON_VERSION)'

    - script: |
        pip install --upgrade pip
        pip install -r requirements.txt
      displayName: 'Install application dependencies'

    - script: |
        pip install pytest pytest-cov
      displayName: 'Install test dependencies'

    - script: |
        pytest tests/ -v --tb=short --cov=. --cov-report=xml --cov-report=term-missing
      displayName: 'Run tests'

    - task: PublishTestResults@2
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: '**/test-results.xml'
        failTaskOnFailedTests: false
      displayName: 'Publish test results'
      condition: always()

    - task: PublishCodeCoverageResults@1
      inputs:
        codeCoverageTool: 'Cobertura'
        summaryFileLocation: '**/coverage.xml'
      displayName: 'Publish code coverage'
      condition: always()

# ── Stage 2: Build Docker Image ───────────────────────────────────────────────
- stage: Build
  displayName: 'Build Docker Image'
  dependsOn: Test
  condition: succeeded()
  jobs:
  - job: BuildImage
    displayName: 'Build & Push to Docker Hub'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: Docker@2
      displayName: 'Log in to Docker Hub'
      inputs:
        command: 'login'
        containerRegistry: 'DockerHubConnection'

    - task: Docker@2
      displayName: 'Build and push image'
      inputs:
        command: 'buildAndPush'
        repository: '$(DOCKERHUB_USERNAME)/$(IMAGE_NAME)'
        dockerfile: 'Dockerfile'
        tags: |
          latest
          $(Build.SourceVersion)

# ── Stage 3: Deploy to EC2 ────────────────────────────────────────────────────
- stage: Deploy
  displayName: 'Deploy to EC2'
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToEC2
    displayName: 'SSH Deploy to AWS EC2'
    pool:
      vmImage: 'ubuntu-latest'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          - script: |
              echo "$(EC2_SSH_KEY)" > private_key.pem
              chmod 600 private_key.pem
              ssh -o StrictHostKeyChecking=no -i private_key.pem \
                $(EC2_USER)@$(EC2_HOST) "
                  cd ~/finance-rag-llm &&
                  DOCKERHUB_USERNAME=$(DOCKERHUB_USERNAME) \
                  docker compose -f docker-compose.prod.yml pull &&
                  DOCKERHUB_USERNAME=$(DOCKERHUB_USERNAME) \
                  docker compose -f docker-compose.prod.yml up -d &&
                  docker system prune -f
                "
              rm -f private_key.pem
            displayName: 'Deploy via SSH'
            env:
              EC2_SSH_KEY: $(EC2_SSH_KEY)
              EC2_USER: $(EC2_USER)
              EC2_HOST: $(EC2_HOST)
              DOCKERHUB_USERNAME: $(DOCKERHUB_USERNAME)
